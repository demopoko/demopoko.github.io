<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Normis · IPFS Token #88 Pixel Generator</title>
    <style>
        :root {
            --bg-dark: #070a13;
            --panel-bg: rgba(17, 25, 40, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-blue: #3b82f6;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(189, 0, 255, 0.1) 0px, transparent 50%);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
            color: var(--text-main);
        }

        .container {
            max-width: 1240px;
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 2.5rem;
            font-family: monospace;
            color: #60a5fa;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .nft-card {
            background: rgba(30, 41, 59, 0.4);
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nft-card:hover {
            transform: translateY(-5px);
            border-color: #4facfe;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .card-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-family: monospace;
            margin-bottom: 1rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        .pixel-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pixel-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .style-badge {
            margin-top: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #60a5fa;
            background: rgba(59, 130, 246, 0.1);
            padding: 6px 16px;
            border-radius: 100px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎨 IPFS Token #88 মাল্টি-স্টাইল জেনারেটর</h1>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">মেটাডাটা ইমেজ লাইভ প্রসেসিং ইঞ্জিন</p>
    </div>

    <div class="status-box" id="statusLog">
        ⏳ IPFS গেটওয়ে থেকে টোকেন #৮৮ এর মেটাডাটা ও ইমেজ রিড করা হচ্ছে...
    </div>

    <div class="card-grid" id="cardGrid"></div>
</div>

<script>
    const TARGET_IPFS = "ipfs://bafybeicyrh4lkik6zhqlheqj4qu6pbc4w3w4hkfbdvoufchzfjwpby5lma/88";
    const GATEWAY = "https://ipfs.io/ipfs/";

    const PIXEL_STYLES = [
        { id: 'classic', name: '✦ Classic 64x64', res: 64 },
        { id: 'minipepe', name: '🐸 Mini Pepe Cute Vibe', res: 48 },
        { id: 'nerd_hd', name: '🤓 Digital Nerds 4K', res: 64 },
        { id: 'dreamer', name: '✨ Digital Dreamer Glow', res: 64 },
        { id: 'cyberpunk', name: '🌆 Cyberpunk Neon', res: 48 },
        { id: 'vintage', name: '🎞️ Vintage Retro Gaming', res: 32 },
        { id: 'pastel', name: '🍦 Cute Pastel Matte', res: 48 },
        { id: 'monochrome', name: '🔲 GameBoy Monochrome', res: 32 },
        { id: 'warm', name: '🌅 Warm Golden Hour', res: 64 },
        { id: 'ice', name: '❄️ Cold Ice Nordic', res: 64 },
        { id: 'matrix', name: '📟 Digital Matrix Code', res: 48 },
        { id: 'highpoly_3d', name: '💎 Glossy Resin Poly', res: 64 },
        { id: 'amber', name: '🏺 Amber Antique', res: 48 },
        { id: 'toxic', name: '🧪 Toxic Radioactive', res: 32 }
    ];

    function initGrid() {
        document.getElementById('cardGrid').innerHTML = PIXEL_STYLES.map(style => `
            <div class="nft-card">
                <div class="card-label">TOKEN #88 <span>${style.res}x${style.res}</span></div>
                <div class="pixel-wrapper">
                    <canvas class="pixel-canvas" id="canvas-${style.id}" width="${style.res}" height="${style.res}"></canvas>
                </div>
                <div class="style-badge">${style.name}</div>
            </div>
        `).join('');
    }

    async function loadIpfsImage() {
        const statusLog = document.getElementById('statusLog');
        const cidPath = TARGET_IPFS.replace("ipfs://", "");
        const metaUrl = `${GATEWAY}${cidPath}`;

        try {
            const response = await fetch(metaUrl);
            if(!response.ok) throw new Error("মেটাডাটা লোড করতে ব্যর্থ হয়েছে।");
            
            const metadata = await response.json();
            let rawImgUrl = metadata.image || metadata.file_url;
            
            if(!rawImgUrl) throw new Error("মেটাডাটাতে কোনো ইমেজ ফাইল পাওয়া যায়নি।");

            let finalImgUrl = rawImgUrl.startsWith("ipfs://") 
                ? rawImgUrl.replace("ipfs://", GATEWAY) 
                : rawImgUrl;

            statusLog.innerHTML = `✅ মেটাডাটা রিড করা সফল! ইমেজ সোর্স প্রসেস করা হচ্ছে...`;

            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                statusLog.innerHTML = `🚀 টোকেন #৮৮ এর ওপর সফলভাবে ১৪টি পিক্সেল ফিল্টার রেন্ডার করা হয়েছে!`;
                processAllStyles(img);
            };
            img.onerror = () => {
                statusLog.innerHTML = `❌ CORS বা গেটওয়ে সমস্যার কারণে ইমেজ লোড ফাইল লক হয়ে গেছে।`;
            };
            img.src = finalImgUrl;

        } catch (error) {
            statusLog.innerHTML = `❌ ভুল: ${error.message} (পাবলিক IPFS গেটওয়ে রেসপন্স টাইমআউট হতে পারে)`;
        }
    }

    function processAllStyles(currentImage) {
        PIXEL_STYLES.forEach(style => {
            const canvas = document.getElementById(`canvas-${style.id}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const res = style.res;

            ctx.clearRect(0, 0, res, res);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(currentImage, 0, 0, res, res);

            const imgData = ctx.getImageData(0, 0, res, res);
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i+1], b = data[i+2];
                let gray = 0.299 * r + 0.587 * g + 0.114 * b;

                switch(style.id) {
                    case 'minipepe':
                        data[i] = Math.max(0, r - 20);
                        data[i+1] = Math.min(255, g * 1.3 + 20);
                        data[i+2] = Math.max(0, b - 10);
                        break;
                    case 'nerd_hd':
                        data[i] = Math.min(255, r * 1.2);
                        data[i+1] = Math.min(255, g * 1.2);
                        data[i+2] = Math.min(255, b * 1.3);
                        break;
                    case 'dreamer':
                        data[i] = Math.min(255, r * 0.9 + 40);
                        data[i+1] = Math.min(255, g * 0.8 + 50);
                        data[i+2] = Math.min(255, b * 1.2 + 60);
                        break;
                    case 'cyberpunk':
                        data[i] = Math.min(255, r * 1.5 + 40);
                        data[i+1] = Math.min(255, g * 0.3);
                        data[i+2] = Math.min(255, b * 1.8 + 50);
                        break;
                    case 'vintage':
                        data[i] = Math.min(255, (r * 0.39) + (g * 0.76) + (b * 0.18));
                        data[i+1] = Math.min(255, (r * 0.34) + (g * 0.68) + (b * 0.16));
                        data[i+2] = Math.min(255, (r * 0.27) + (g * 0.53) + (b * 0.13));
                        break;
                    case 'pastel':
                        data[i] = Math.min(255, r * 0.6 + 100);
                        data[i+1] = Math.min(255, g * 0.6 + 100);
                        data[i+2] = Math.min(255, b * 0.5 + 120);
                        break;
                    case 'monochrome':
                        let v = gray > 127 ? 240 : 30;
                        data[i] = data[i+1] = data[i+2] = v;
                        break;
                    case 'warm':
                        data[i] = Math.min(255, r * 1.4 + 30);
                        data[i+1] = Math.min(255, g * 1.1 + 10);
                        data[i+2] = b * 0.6;
                        break;
                    case 'ice':
                        data[i] = r * 0.5;
                        data[i+1] = Math.min(255, g * 1.1 + 20);
                        data[i+2] = Math.min(255, b * 1.5 + 40);
                        break;
                    case 'matrix':
                        data[i] = 0; data[i+1] = Math.min(255, gray * 1.6); data[i+2] = 0;
                        break;
                    case 'highpoly_3d':
                        let factor = gray > 180 ? 1.4 : 0.8;
                        data[i] = Math.min(255, r * factor);
                        data[i+1] = Math.min(255, g * factor);
                        data[i+2] = Math.min(255, b * factor);
                        break;
                    case 'amber':
                        data[i] = Math.min(255, gray * 1.3); data[i+1] = Math.min(255, gray * 0.9); data[i+2] = Math.min(255, gray * 0.3);
                        break;
                    case 'toxic':
                        data[i] = Math.min(255, r * 0.8 + 20); data[i+1] = Math.min(255, g * 1.5 + 40); data[i+2] = 0;
                        break;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        });
    }

    // রান ইঞ্জিন
    initGrid();
    loadIpfsImage();
</script>
</body>
</html>
