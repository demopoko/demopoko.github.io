<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗿 Normies Engraved LED (Zero Background Edition)</title>
    <style>
        :root {
            --bg-dark: #050507;
            --panel-bg: rgba(10, 10, 12, 0.95);
            --border-color: rgba(255, 255, 255, 0.03);
            --text-main: #f0f4ff;
            --text-muted: #4f5e75;
            --accent: #00f0ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--text-main);
        }
        .container {
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
            background: var(--panel-bg);
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
        }
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .header h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00f0ff 0%, #ff0055 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .sub {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.05rem;
        }
        .header .sub span {
            color: #00f0ff;
            font-weight: 700;
        }
        .status-box {
            background: rgba(5, 5, 7, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.15);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 2.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: #00f0ff;
        }
        .status-box .counter {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
        }
        .progress-wrapper {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f0ff, #ff0055);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .nft-card {
            background: rgba(8, 8, 10, 0.8);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .nft-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 240, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 240, 255, 0.04);
            background: rgba(12, 12, 15, 0.9);
        }
        .nft-card .card-index {
            color: var(--text-muted);
            font-size: 0.7rem;
            font-family: monospace;
            margin-bottom: 0.7rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            opacity: 0.8;
        }
        .nft-card .image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            overflow: hidden;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .nft-card .image-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .nft-card .token-id {
            margin-top: 0.8rem;
            font-size: 0.75rem;
            color: #00f0ff;
            font-weight: 600;
            background: rgba(0, 240, 255, 0.04);
            padding: 4px 12px;
            border-radius: 100px;
            border: 1px solid rgba(0, 240, 255, 0.08);
        }
        .load-more-btn {
            display: block;
            width: 220px;
            margin: 2rem auto 0 auto;
            padding: 1rem;
            background: linear-gradient(135deg, #00f0ff, #ff0055);
            color: #000000;
            font-weight: bold;
            font-family: inherit;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .load-more-btn:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
        }
        .load-more-btn:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }
        /* মোডাল */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            backdrop-filter: blur(20px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #050507;
            border-radius: 28px;
            padding: 2.2rem;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.95);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #64748b;
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
        }
        .modal-image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 20px;
            overflow: hidden;
            background: #000000;
            border: 1px solid rgba(0, 240, 255, 0.1);
        }
        .modal-image-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .modal-title {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
        }
        .modal-sub {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.4rem;
        }
        @media (max-width: 640px) {
            .container { padding: 1.2rem; }
            .header h1 { font-size: 1.8rem; }
            .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .nft-card { padding: 0.7rem; }
            .modal-content { padding: 1.2rem; margin: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🗿 Normies Engraved LED</h1>
        <div class="sub">১০০% সলিড ব্ল্যাক ব্যাকগ্রাউন্ড ও ক্লিয়ার ক্যারেক্টার · <span>64x64 Plate</span></div>
    </div>

    <div class="status-box" id="statusLog">
        ⏳ মেটাডাটা লোড হচ্ছে... <span class="counter" id="loadedCount">0</span> / 100
    </div>

    <div class="progress-wrapper">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="card-grid" id="cardGrid"></div>

    <button class="load-more-btn" id="loadMoreBtn" disabled>⏳ লোড হচ্ছে...</button>
</div>

<!-- মোডাল -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <button class="modal-close" id="modalClose">✕</button>
        <div class="modal-image-wrapper">
            <canvas id="modalCanvas" width="512" height="512"></canvas>
        </div>
        <div class="modal-title" id="modalTitle">Token #1</div>
        <div class="modal-sub" id="modalSub">Engraved LED Matrix (64x64)</div>
    </div>
</div>

<script>
    // ——— কনফিগ ———
    const METADATA_BASE = "ipfs://QmeSjSinHpPnmXmspMjwiXyN6zS4E9zccariGR3jxcaWtq";
    const GATEWAY = "https://ipfs.io/ipfs/";
    const TOTAL_TOKENS = 100;
    const BATCH_SIZE = 20;
    const GRID_SIZE = 64;

    let loadedTokens = 0;
    let isProcessing = false;

    // ——— DOM রেফ ———
    const grid = document.getElementById('cardGrid');
    const statusLog = document.getElementById('statusLog');
    const loadedCount = document.getElementById('loadedCount');
    const progressBar = document.getElementById('progressBar');
    const loadMoreBtn = document.getElementById('loadMoreBtn');

    // ——— মোডাল ———
    const modalOverlay = document.getElementById('modalOverlay');
    const modalCanvas = document.getElementById('modalCanvas');
    const modalTitle = document.getElementById('modalTitle');
    const modalSub = document.getElementById('modalSub');
    const modalClose = document.getElementById('modalClose');

    function closeModal() {
        modalOverlay.classList.remove('active');
        document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // ——— মেটাডাটা লোড ———
    async function loadMetadata(start, count) {
        const promises = [];
        for (let i = start; i < start + count && i <= TOTAL_TOKENS; i++) {
            const url = `${GATEWAY}${METADATA_BASE.replace('ipfs://', '')}/${i}`;
            promises.push(
                fetch(url)
                    .then(res => res.ok ? res.json() : null)
                    .catch(() => null)
            );
        }
        return Promise.all(promises);
    }

    // ——— ১০০% পিওর ব্ল্যাক ব্যাকগ্রাউন্ড এবং বডি এলইড প্রসেসর ———
    function applyEngravedLEDGridEffect(ctx, img, width, height) {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = GRID_SIZE;
        tempCanvas.height = GRID_SIZE;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.imageSmoothingEnabled = false;
        tempCtx.drawImage(img, 0, 0, GRID_SIZE, GRID_SIZE);

        const imgData = tempCtx.getImageData(0, 0, GRID_SIZE, GRID_SIZE);
        const data = imgData.data;

        // সম্পূর্ণ স্ক্রিন কুচকুচে কালো ব্যাকগ্রাউন্ড
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, width, height);

        const blockSize = width / GRID_SIZE;

        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                const idx = (y * GRID_SIZE + x) * 4;
                const r = data[idx];
                const g = data[idx+1];
                const b = data[idx+2];
                const a = data[idx+3];

                const posX = x * blockSize;
                const posY = y * blockSize;

                // ব্যাকগ্রাউন্ড ট্র্যান্সপারেন্ট হলে খালি কালো থাকবে
                if (a < 50) {
                    continue;
                }

                // কালার ইনভার্স রিলেশন ও কঠোর থ্রেশহোল্ড চেক
                const brightness = 0.299 * r + 0.587 * g + 0.114 * b;

                // থ্রেশহোল্ড কমিয়ে দেওয়া হলো (< 50) যেন ব্যাকগ্রাউন্ডের ধূসর আলো কোনোভাবে ধরা না পড়ে
                if (brightness < 50) {
                    // ১. সকেট ব্যাকগ্রাউন্ড বা পকেট ড্র করা (ক্যারেক্টারের অবয়বের নিচে হালকা গর্তের থ্রিডি ইফেক্ট)
                    ctx.fillStyle = '#101014'; 
                    ctx.fillRect(posX + 1, posY + 1, blockSize - 1, blockSize - 1);

                    // ২. ক্যারেক্টারের বডি ও ডিটেইলস ভাইব্রেন্ট কালার ম্যাপিং
                    if (brightness < 18) {
                        ctx.fillStyle = '#ff0055'; // চরম ডার্ক হাইলাইটগুলোতে হট নিয়ন পিঙ্ক
                    } else if (brightness >= 18 && brightness < 35) {
                        ctx.fillStyle = '#00f0ff'; // ক্যারেক্টারের মূল বডি স্ট্রাকচারে উজ্জ্বল নিয়ন সায়ান
                    } else {
                        ctx.fillStyle = '#d4ff00'; // ফেস ও ট্রেইটস লাইনে ম্যাজিক লাইম গ্রিন
                    }

                    // বিশেষ স্পট কালার প্রিজার্ভেশন (যেমন চশমা, মুখ বা লালচে অংশ)
                    if (r > 190 && b < 120 && g < 120) {
                        ctx.fillStyle = '#ff3c00'; // ভাইব্রেন্ট নিয়ন রেড
                    }

                    ctx.fillRect(posX + 2, posY + 2, blockSize - 3, blockSize - 3);
                } else {
                    // এটি মূল ফটোর লাইট গ্রে/সাদা ব্যাকগ্রাউন্ড এরিয়া। 
                    // যেহেতু লক্ষ্য ব্যাকগ্রাউন্ড কালো রাখা—এখানে সলিড কালো ছাড়া আর কিছু ড্র করা হবে না।
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(posX, posY, blockSize, blockSize);
                }
            }
        }
    }

    // ——— একক NFT প্রসেস ———
    function processNFT(metadata, index) {
        return new Promise((resolve) => {
            const imgUrl = metadata?.image || metadata?.file_url || '';
            if (!imgUrl) {
                resolve(null);
                return;
            }

            const finalUrl = imgUrl.startsWith('ipfs://') 
                ? imgUrl.replace('ipfs://', GATEWAY) 
                : imgUrl;

            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                
                applyEngravedLEDGridEffect(ctx, img, 512, 512);

                const card = document.createElement('div');
                card.className = 'nft-card';
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-index"><span>#${index}</span> <span style="font-size:0.6rem; color:#00f0ff; font-weight: bold;">NEON GLOW</span></div>
                    <div class="image-wrapper"></div>
                    <div class="token-id">👾 Token #${index}</div>
                `;

                const wrapper = card.querySelector('.image-wrapper');
                wrapper.appendChild(canvas);

                card.addEventListener('click', () => {
                    openModal(canvas, `🗿 Token #${index}`, `Clear Engraved LED · ${index}/100`);
                });

                resolve(card);
            };
            img.onerror = () => resolve(null);
            img.src = finalUrl;
        });
    }

    // ——— মোডাল ওপেন ———
    function openModal(sourceCanvas, title, sub) {
        const ctx = modalCanvas.getContext('2d');
        modalCanvas.width = 512;
        modalCanvas.height = 512;
        ctx.imageSmoothingEnabled = false;

        ctx.clearRect(0, 0, 512, 512);
        ctx.drawImage(sourceCanvas, 0, 0, 512, 512);

        modalTitle.textContent = title;
        modalSub.textContent = sub;
        modalOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    // ——— ব্যাচ প্রসেস ———
    async function processBatch(startIndex) {
        if (isProcessing) return;
        isProcessing = true;
        loadMoreBtn.disabled = true;
        loadMoreBtn.textContent = '⏳ প্রসেসিং...';

        const end = Math.min(startIndex + BATCH_SIZE - 1, TOTAL_TOKENS);
        const count = end - startIndex + 1;

        statusLog.innerHTML = `⏳ মেটাডাটা লোড হচ্ছে... <span class="counter">${loadedTokens}</span> / ${TOTAL_TOKENS}`;
        const metadatas = await loadMetadata(startIndex, count);
        const fragment = document.createDocumentFragment();

        for (let i = 0; i < metadatas.length; i++) {
            const meta = metadatas[i];
            const tokenIndex = startIndex + i;
            const card = await processNFT(meta, tokenIndex);
            if (card) {
                fragment.appendChild(card);
            }
            loadedTokens++;
            loadedCount.textContent = loadedTokens;
            progressBar.style.width = `${(loadedTokens / TOTAL_TOKENS) * 100}%`;
            statusLog.innerHTML = `⏳ প্রসেসিং... <span class="counter">${loadedTokens}</span> / ${TOTAL_TOKENS}`;
        }

        grid.appendChild(fragment);

        if (loadedTokens >= TOTAL_TOKENS) {
            statusLog.innerHTML = `✅ সম্পূর্ণ! <span class="counter">${TOTAL_TOKENS}</span> টি NFT হুবহু <span style="color:#00f0ff; font-weight:bold;">Engraved Neon Glow</span> স্টাইলে রূপান্তরিত!`;
            loadMoreBtn.style.display = 'none';
        } else {
            statusLog.innerHTML = `⏳ লোড হচ্ছে... <span class="counter">${loadedTokens}</span> / ${TOTAL_TOKENS}`;
            loadMoreBtn.textContent = `📥 আরও ${Math.min(BATCH_SIZE, TOTAL_TOKENS - loadedTokens)}টি লোড করুন`;
            loadMoreBtn.disabled = false;
        }
        isProcessing = false;
    }

    loadMoreBtn.addEventListener('click', () => {
        if (!isProcessing && loadedTokens < TOTAL_TOKENS) {
            processBatch(loadedTokens + 1);
        }
    });

    // প্রথম ব্যাচ রান করা
    processBatch(1);
</script>

</body>
</html>
