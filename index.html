<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚡ Turbo NFT Downloader — 10,000 in 3 Mins</title>
    
    <!-- JSZip for ZIP compilation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #06060c;
            color: #f3f4f6;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(18,18,32,0.9), rgba(10,10,18,0.95));
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 255, 0, 0.1);
        }

        header .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d4ff00, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header .subtitle {
            color: #9ca3af;
            margin-top: 8px;
            font-size: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 25px auto 0;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-box .label { font-size: 0.7rem; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; }
        .stat-box .value { font-size: 1.5rem; font-weight: 700; color: #d4ff00; margin-top: 4px; }
        .stat-box .value.failed { color: #ff4444; }

        .toolbar {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin: 25px 0 30px;
        }

        .toolbar button {
            background: #11111f;
            border: 1px solid rgba(255,255,255,0.08);
            color: #fff;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar button#startBtn {
            background: #d4ff00;
            color: #06060c;
            border: none;
        }

        .toolbar button#startBtn:hover {
            background: #fff;
            box-shadow: 0 0 40px rgba(212, 255, 0, 0.3);
            transform: translateY(-2px);
        }

        .toolbar button#startBtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .toolbar button:not(#startBtn):hover {
            background: rgba(255,255,255,0.05);
            border-color: #d4ff00;
            color: #d4ff00;
        }

        /* ===== PROGRESS ===== */
        .progress-container {
            max-width: 900px;
            margin: 0 auto 20px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4ff00, #00ffcc);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .progress-info strong { color: #d4ff00; }

        /* ===== FAILED LOG ===== */
        .failed-log {
            max-width: 900px;
            margin: 15px auto 25px;
            padding: 15px 20px;
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.1);
            border-radius: 12px;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .failed-log.show { display: block; }
        .failed-log .title { color: #ff4444; font-weight: 600; margin-bottom: 8px; }
        .failed-log .ids { color: #ff8888; font-size: 0.85rem; word-break: break-all; }
        .failed-log .count { color: #ff6666; font-weight: 700; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #11111f; color: #fff; padding: 14px 30px; border-radius: 14px;
            border: 1px solid rgba(212, 255, 0, 0.2); font-weight: 600; font-size: 0.9rem;
            opacity: 0; transition: all 0.4s; z-index: 9999;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 90vw;
            text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: rgba(255, 68, 68, 0.3); }
        .toast.success { border-color: rgba(212, 255, 0, 0.3); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            header .logo { font-size: 2rem; }
            .toolbar button { padding: 10px 18px; font-size: 0.8rem; }
            .stat-box .value { font-size: 1.2rem; }
            .toast { font-size: 0.8rem; padding: 12px 20px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">⚡ TURBO DOWNLOADER</div>
        <p class="subtitle">10,000 Cool Cats — Max Speed — Zero Fail</p>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="label">📦 Total</div>
                <div class="value" id="totalStats">0</div>
            </div>
            <div class="stat-box">
                <div class="label">✅ Success</div>
                <div class="value" id="successStats">0</div>
            </div>
            <div class="stat-box">
                <div class="label">❌ Failed</div>
                <div class="value failed" id="failedStats">0</div>
            </div>
            <div class="stat-box">
                <div class="label">⏱️ Speed</div>
                <div class="value" id="speedStats">0/s</div>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <button id="startBtn">🚀 Start Turbo Download</button>
        <button id="downloadZipBtn" disabled>📦 Download ZIP</button>
        <button id="resetBtn">⟳ Reset</button>
    </div>

    <!-- ===== PROGRESS ===== -->
    <div class="progress-container">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-info">
            <span>📊 <strong id="progressPercent">0%</strong></span>
            <span>⏳ <strong id="progressCount">0</strong> / 10,000</span>
            <span>⚡ <strong id="progressSpeed">0</strong> / sec</span>
        </div>
    </div>

    <!-- ===== FAILED LOG ===== -->
    <div class="failed-log" id="failedLog">
        <div class="title">❌ Failed Token IDs:</div>
        <div class="ids" id="failedIds"></div>
        <div style="margin-top:8px;">Total: <span class="count" id="failedCount">0</span></div>
    </div>

    <div id="toast" class="toast">✨ Ready</div>

    <script>
        (function() {
            'use strict';

            // ===== DOM REFS =====
            const startBtn = document.getElementById('startBtn');
            const downloadZipBtn = document.getElementById('downloadZipBtn');
            const resetBtn = document.getElementById('resetBtn');
            const progressFill = document.getElementById('progressFill');
            const progressPercent = document.getElementById('progressPercent');
            const progressCount = document.getElementById('progressCount');
            const progressSpeed = document.getElementById('progressSpeed');
            const totalStats = document.getElementById('totalStats');
            const successStats = document.getElementById('successStats');
            const failedStats = document.getElementById('failedStats');
            const speedStats = document.getElementById('speedStats');
            const failedLog = document.getElementById('failedLog');
            const failedIds = document.getElementById('failedIds');
            const failedCount = document.getElementById('failedCount');
            const toast = document.getElementById('toast');

            // ===== CONFIG =====
            const TOTAL = 10000;
            const CONCURRENT = 50; // 50 parallel requests (MAX SPEED)

            // ===== STATE =====
            let isRunning = false;
            let isComplete = false;
            let successCount = 0;
            let failCount = 0;
            let processedCount = 0;
            let failedTokens = [];
            let allData = [];
            let startTime = 0;
            let speedHistory = [];

            // ===== TOAST =====
            function showToast(msg, type = 'success', duration = 3000) {
                toast.textContent = msg;
                toast.className = 'toast ' + type;
                toast.classList.add('show');
                clearTimeout(toast._hide);
                toast._hide = setTimeout(() => toast.classList.remove('show'), duration);
            }

            // ===== UPDATE UI =====
            function updateUI() {
                const pct = Math.min(100, Math.round((processedCount / TOTAL) * 100));
                progressFill.style.width = pct + '%';
                progressPercent.textContent = pct + '%';
                progressCount.textContent = processedCount;
                totalStats.textContent = processedCount;
                successStats.textContent = successCount;
                failedStats.textContent = failCount;

                // Speed calculation
                if (startTime > 0) {
                    const elapsed = (Date.now() - startTime) / 1000;
                    const speed = elapsed > 0 ? Math.round(processedCount / elapsed) : 0;
                    progressSpeed.textContent = speed;
                    speedStats.textContent = speed + '/s';
                }

                // Failed log
                if (failedTokens.length > 0) {
                    failedLog.classList.add('show');
                    failedIds.textContent = failedTokens.join(', ');
                    failedCount.textContent = failedTokens.length;
                } else {
                    failedLog.classList.remove('show');
                }

                // Update button state
                if (isComplete) {
                    startBtn.disabled = true;
                    startBtn.textContent = '✅ Complete!';
                    downloadZipBtn.disabled = false;
                }
            }

            // ===== FETCH SINGLE NFT =====
            async function fetchNFT(id) {
                const url = `https://api.coolcatsnft.com/cat/${id}`;
                try {
                    const res = await fetch(url, {
                        headers: { 'Accept': 'application/json' }
                    });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    return { success: true, id, data };
                } catch (err) {
                    return { success: false, id, error: err.message };
                }
            }

            // ===== PROCESS BATCH =====
            async function processBatch(ids) {
                const promises = ids.map(id => fetchNFT(id));
                const results = await Promise.all(promises);

                const batchData = [];
                for (const result of results) {
                    if (result.success) {
                        successCount++;
                        batchData.push({
                            id: result.id,
                            data: result.data,
                            imageUrl: result.data.ipfs_image || result.data.image || ''
                        });
                    } else {
                        failCount++;
                        failedTokens.push(result.id);
                    }
                    processedCount++;
                }

                return batchData;
            }

            // ===== PROCESS IMAGE (Background Replace + Flip + Watermark) =====
            function processImage(imageUrl, tokenId) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = 'Anonymous';
                    img.src = imageUrl;

                    img.onload = function() {
                        try {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const size = Math.min(img.width, img.height);
                            canvas.width = size;
                            canvas.height = size;

                            // Draw centered
                            const sx = (img.width - size) / 2;
                            const sy = (img.height - size) / 2;
                            ctx.drawImage(img, sx, sy, size, size, 0, 0, size, size);

                            // Background replace
                            const imageData = ctx.getImageData(0, 0, size, size);
                            const data = imageData.data;

                            // Sample edges for background
                            const samples = [];
                            const step = Math.max(1, Math.floor(size / 20));
                            for (let x = 0; x < size; x += step) {
                                samples.push({ r: data[x * 4], g: data[x * 4 + 1], b: data[x * 4 + 2] });
                                const idx = ((size - 1) * size + x) * 4;
                                samples.push({ r: data[idx], g: data[idx + 1], b: data[idx + 2] });
                            }
                            for (let y = 0; y < size; y += step) {
                                const idx = (y * size) * 4;
                                samples.push({ r: data[idx], g: data[idx + 1], b: data[idx + 2] });
                                const idx2 = (y * size + size - 1) * 4;
                                samples.push({ r: data[idx2], g: data[idx2 + 1], b: data[idx2 + 2] });
                            }

                            const colorCount = {};
                            samples.forEach(s => {
                                const r = Math.round(s.r / 10) * 10;
                                const g = Math.round(s.g / 10) * 10;
                                const b = Math.round(s.b / 10) * 10;
                                const key = `${r},${g},${b}`;
                                colorCount[key] = (colorCount[key] || 0) + 1;
                            });

                            let maxCount = 0;
                            let bgColor = { r: 0, g: 0, b: 0 };
                            for (const [key, count] of Object.entries(colorCount)) {
                                if (count > maxCount) {
                                    maxCount = count;
                                    const [r, g, b] = key.split(',').map(Number);
                                    bgColor = { r, g, b };
                                }
                            }

                            const tolerance = 50;
                            const targetR = 212, targetG = 255, targetB = 0;

                            for (let i = 0; i < data.length; i += 4) {
                                const r = data[i], g = data[i + 1], b = data[i + 2];
                                const isBg = (
                                    Math.abs(r - bgColor.r) < tolerance &&
                                    Math.abs(g - bgColor.g) < tolerance &&
                                    Math.abs(b - bgColor.b) < tolerance
                                );
                                const isDark = (r < 30 && g < 30 && b < 30);
                                const isWhite = (r > 240 && g > 240 && b > 240);

                                if (isBg || isDark || isWhite) {
                                    data[i] = targetR;
                                    data[i + 1] = targetG;
                                    data[i + 2] = targetB;
                                    data[i + 3] = 255;
                                }
                            }
                            ctx.putImageData(imageData, 0, 0);

                            // Flip horizontally
                            const tempCanvas = document.createElement('canvas');
                            tempCanvas.width = size;
                            tempCanvas.height = size;
                            const tempCtx = tempCanvas.getContext('2d');
                            tempCtx.drawImage(canvas, 0, 0);

                            ctx.fillStyle = '#d4ff00';
                            ctx.fillRect(0, 0, size, size);
                            ctx.save();
                            ctx.translate(size, 0);
                            ctx.scale(-1, 1);
                            ctx.drawImage(tempCanvas, 0, 0);
                            ctx.restore();

                            resolve(canvas.toDataURL('image/png'));
                        } catch (err) {
                            resolve(imageUrl);
                        }
                    };
                    img.onerror = () => resolve(imageUrl);
                });
            }

            // ===== DOWNLOAD ALL =====
            async function downloadAllAsZip() {
                if (allData.length === 0) {
                    showToast('⚠️ No data to download', 'error');
                    return;
                }

                showToast('⏳ Compiling ZIP... Please wait.', 'success', 5000);
                downloadZipBtn.disabled = true;
                downloadZipBtn.textContent = '⏳ Zipping...';

                const zip = new JSZip();
                const imgFolder = zip.folder("images");
                const metaFolder = zip.folder("metadata");

                let processed = 0;
                const total = allData.length;

                // Process in chunks to avoid memory issues
                const chunkSize = 100;
                for (let i = 0; i < allData.length; i += chunkSize) {
                    const chunk = allData.slice(i, i + chunkSize);

                    // Process images in parallel
                    const processPromises = chunk.map(async (item) => {
                        const processedImg = await processImage(item.imageUrl, item.id);
                        return { ...item, processedImg };
                    });

                    const processedChunk = await Promise.all(processPromises);

                    for (const item of processedChunk) {
                        const fileName = `${item.id + 1}`;
                        if (item.processedImg.startsWith('data:image/png;base64,')) {
                            const rawBase64 = item.processedImg.split(',')[1];
                            imgFolder.file(`${fileName}.png`, rawBase64, { base64: true });
                        }
                        metaFolder.file(`${fileName}.json`, JSON.stringify(item.data, null, 2));
                    }

                    processed += chunk.length;
                    const pct = Math.round((processed / total) * 100);
                    showToast(`⏳ Zipping: ${pct}%`, 'success', 2000);
                }

                zip.generateAsync({ type: "blob" }).then(function(content) {
                    const url = URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `CoolCats_${allData.length}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    downloadZipBtn.disabled = false;
                    downloadZipBtn.textContent = '📦 Download ZIP';
                    showToast('✅ ZIP Downloaded Successfully!', 'success');
                }).catch(() => {
                    downloadZipBtn.disabled = false;
                    downloadZipBtn.textContent = '📦 Download ZIP';
                    showToast('❌ Error during ZIP compilation', 'error');
                });
            }

            // ===== MAIN DOWNLOAD ENGINE =====
            async function startTurboDownload() {
                if (isRunning) return;

                isRunning = true;
                isComplete = false;
                startBtn.disabled = true;
                startBtn.textContent = '⏳ Running...';
                downloadZipBtn.disabled = true;
                allData = [];
                failedTokens = [];
                successCount = 0;
                failCount = 0;
                processedCount = 0;
                startTime = Date.now();

                showToast('🚀 Starting Turbo Download...', 'success');

                const totalBatches = Math.ceil(TOTAL / CONCURRENT);

                for (let batch = 0; batch < totalBatches; batch++) {
                    const startId = batch * CONCURRENT;
                    const endId = Math.min(startId + CONCURRENT, TOTAL);
                    const ids = [];
                    for (let i = startId; i < endId; i++) {
                        ids.push(i);
                    }

                    const batchData = await processBatch(ids);
                    allData.push(...batchData);

                    // Speed update
                    const elapsed = (Date.now() - startTime) / 1000;
                    const speed = elapsed > 0 ? Math.round(processedCount / elapsed) : 0;

                    updateUI();

                    // Show live status
                    if (batch % 5 === 0 || batch === totalBatches - 1) {
                        const pct = Math.round((processedCount / TOTAL) * 100);
                        showToast(`⚡ ${processedCount}/${TOTAL} (${pct}%) — ${speed}/s`, 'success', 1500);
                    }
                }

                isRunning = false;
                isComplete = true;
                startBtn.disabled = true;
                startBtn.textContent = '✅ Complete!';
                downloadZipBtn.disabled = false;
                updateUI();

                const elapsed = (Date.now() - startTime) / 1000;
                const avgSpeed = Math.round(processedCount / elapsed);

                if (failedTokens.length > 0) {
                    showToast(`⚠️ Complete! ${failedTokens.length} failed. Check log.`, 'error', 5000);
                } else {
                    showToast(`🎉 All ${TOTAL} downloaded in ${Math.round(elapsed)}s (${avgSpeed}/s)!`, 'success', 5000);
                }
            }

            // ===== RESET =====
            function resetAll() {
                if (isRunning) return;

                isComplete = false;
                allData = [];
                failedTokens = [];
                successCount = 0;
                failCount = 0;
                processedCount = 0;
                startTime = 0;

                startBtn.disabled = false;
                startBtn.textContent = '🚀 Start Turbo Download';
                downloadZipBtn.disabled = true;
                downloadZipBtn.textContent = '📦 Download ZIP';

                progressFill.style.width = '0%';
                progressPercent.textContent = '0%';
                progressCount.textContent = '0';
                progressSpeed.textContent = '0';
                totalStats.textContent = '0';
                successStats.textContent = '0';
                failedStats.textContent = '0';
                speedStats.textContent = '0/s';
                failedLog.classList.remove('show');
                failedIds.textContent = '';
                failedCount.textContent = '0';

                showToast('⟳ Reset Complete', 'success');
            }

            // ===== EVENT LISTENERS =====
            startBtn.addEventListener('click', startTurboDownload);
            downloadZipBtn.addEventListener('click', downloadAllAsZip);
            resetBtn.addEventListener('click', resetAll);

            // ===== INIT =====
            updateUI();
            showToast('✨ Ready — Click "Start Turbo Download"', 'success', 3000);

        })();
    </script>

</body>
</html>
