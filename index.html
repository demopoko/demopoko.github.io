<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Lottie Converter</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lottie Player for preview -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="p-4 border-b border-slate-800 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                LottieAnim Mobile
            </h1>
            <span class="text-[10px] bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-2.5 py-0.5 rounded-full font-mono">MOBILE READY</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto p-4 w-full flex-grow flex flex-col justify-center gap-6">
        
        <div class="text-center px-2">
            <h2 class="text-2xl font-black mb-2">মোবাইল দিয়ে তৈরি করো <span class="text-cyan-400">Lottie Animation</span></h2>
            <p class="text-slate-400 text-xs leading-relaxed">নিচের বক্সে ট্যাপ করে গ্যালারি থেকে যেকোনো ছবি সিলেক্ট করো। সেটি নিজে থেকেই একটি সুন্দর লুপ অ্যানিমেশনে পরিণত হবে।</p>
        </div>

        <!-- Converter Card -->
        <div class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-5 shadow-2xl">
            
            <!-- Mobile Tap Upload Zone -->
            <label for="fileInput" class="block border-2 border-dashed border-slate-700 hover:border-cyan-500 active:scale-[0.98] rounded-xl p-8 text-center cursor-pointer transition-all duration-200 bg-slate-900/40 dynamic-tap">
                <!-- Hidden Native Input with Accept Attribute -->
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                
                <div class="flex flex-col items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <p class="text-sm font-semibold text-slate-200">এখানে ট্যাপ করে ছবি সিলেক্ট করো</p>
                    <p class="text-[11px] text-slate-500">PNG, JPG অথবা WEBP সাপোর্ট করে</p>
                </div>
            </label>

            <!-- Processing / Preview Section (Hidden by default) -->
            <div id="previewSection" class="hidden mt-5 pt-5 border-t border-slate-800">
                <div class="flex flex-col gap-5">
                    
                    <!-- Animation Preview Box -->
                    <div class="bg-slate-900 rounded-xl p-4 flex flex-col items-center justify-center min-h-[220px] border border-slate-800 relative">
                        <span class="absolute top-3 left-3 text-[10px] text-slate-500 uppercase tracking-wider font-mono">Live Mobile Preview</span>
                        <div id="lottiePlayer" class="w-40 h-40"></div>
                    </div>

                    <!-- Actions -->
                    <div class="flex flex-col gap-3">
                        <div class="bg-slate-900/60 p-3 rounded-lg border border-slate-800 flex justify-between items-center text-xs">
                            <span class="text-slate-400">স্ট্যাটাস:</span>
                            <span class="text-emerald-400 font-medium flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block animate-pulse"></span> জেনারেটেড!
                            </span>
                        </div>

                        <button id="downloadBtn" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 active:from-cyan-600 active:to-blue-700 text-slate-950 font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-cyan-500/10 transition-all duration-150 flex justify-center items-center gap-2 text-sm cursor-pointer">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Lottie JSON ডাউনলোড করো
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="p-4 text-center text-[10px] text-slate-600 border-t border-slate-800 bg-slate-950/20">
        মোবাইল ও ওয়েব ফ্রেন্ডলি লাইটওয়েট কনভার্টার
    </footer>

    <!-- Core JavaScript for Mobile Input & Processing -->
    <script>
        const fileInput = document.getElementById('fileInput');
        const previewSection = document.getElementById('previewSection');
        const lottiePlayer = document.getElementById('lottiePlayer');
        const downloadBtn = document.getElementById('downloadBtn');
        
        let generatedLottieJson = null;
        let currentAnimation = null;

        // Listen for standard mobile file change
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                processImage(e.target.files[0]);
            }
        });

        // Convert image to Mobile Optimized Lottie Loop
        function processImage(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const base64Image = event.target.result;
                
                // Pure Lottie/Bodymovin JSON Payload with floating loop
                generatedLottieJson = {
                    v: "5.7.4",
                    fr: 30,
                    ip: 0,
                    op: 60, 
                    w: 500,
                    h: 500,
                    nm: "Mobile Smooth Anim",
                    assets: [
                        {
                            id: "img_asset",
                            w: 500,
                            h: 500,
                            u: "",
                            p: base64Image,
                            e: 0
                        }
                    ],
                    layers: [
                        {
                            ddd: 0,
                            ind: 1,
                            ty: 2, 
                            nm: "Mobile_Layer",
                            refId: "img_asset",
                            sr: 1,
                            ks: {
                                o: { a: 0, k: 100, ix: 11 },
                                r: { a: 0, k: 0, ix: 10 },
                                p: {
                                    a: 1, 
                                    k: [
                                        { t: 0, s: [250, 250, 0], e: [250, 230, 0], to: [0, -3, 0], ti: [0, 3, 0] },
                                        { t: 30, s: [250, 230, 0], e: [250, 250, 0], to: [0, 3, 0], ti: [0, -3, 0] },
                                        { t: 60 }
                                    ],
                                    ix: 2
                                },
                                a: { a: 0, k: [250, 250, 0], ix: 1 },
                                s: {
                                    a: 1, 
                                    k: [
                                        { t: 0, s: [75, 75, 100], e: [78, 78, 100] },
                                        { t: 30, s: [78, 78, 100], e: [75, 75, 100] },
                                        { t: 60 }
                                    ],
                                    ix: 6
                                }
                            },
                            ao: 0,
                            ip: 0,
                            op: 60,
                            st: 0,
                            bm: 0
                        }
                    ]
                };

                renderMobilePreview(generatedLottieJson);
            };
        }

        // Render function
        function renderMobilePreview(jsonData) {
            previewSection.classList.remove('hidden');
            lottiePlayer.innerHTML = ''; 

            if(currentAnimation) {
                currentAnimation.destroy();
            }

            currentAnimation = lottie.loadAnimation({
                container: lottiePlayer,
                renderer: 'svg',
                loop: true,
                autoplay: true,
                animationData: JSON.parse(JSON.stringify(jsonData))
            });

            // Auto smooth scroll to preview on mobile screen
            setTimeout(() => {
                previewSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        // Mobile Download Triggers standard Blob Action
        downloadBtn.addEventListener('click', () => {
            if(!generatedLottieJson) return;
            
            const jsonString = JSON.stringify(generatedLottieJson, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const downloadUrl = URL.createObjectURL(blob);
            
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = downloadUrl;
            downloadAnchor.download = "mobile-lottie-anim.json";
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            
            // Clean up memory
            document.body.removeChild(downloadAnchor);
            URL.revokeObjectURL(downloadUrl);
        });
    </script>
</body>
</html>
