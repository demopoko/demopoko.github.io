<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Layer-Based NFT Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="bg-indigo-600 text-white p-2 rounded-lg font-bold text-xl">⚡</div>
      <h1 class="text-xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
        NFT SVG LAYER GENERATOR
      </h1>
    </div>
    <span id="db-status" class="text-xs text-amber-400 bg-amber-950/50 px-3 py-1.5 rounded-full border border-amber-800">Connecting...</span>
  </header>

  <!-- Main Container -->
  <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <!-- Left Panel: SVG Upload and Layers Management -->
    <section class="lg:col-span-7 space-y-6">
      
      <!-- Create / Add New Layer Category -->
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-400">
          <span>📁</span> 1. Manage Layers
        </h2>
        <div class="flex gap-3">
          <input id="layer-name-input" type="text" placeholder="e.g. Background, Body, Eyes" 
            class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-200" />
          <button id="add-layer-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-6 py-3 rounded-xl text-sm transition-all shadow-lg active:scale-95">
            Create Layer
          </button>
        </div>
      </div>

      <!-- Upload SVG Code -->
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-400">
          <span>🎨</span> 2. Upload SVG Trait Code
        </h2>
        <div class="space-y-4">
          <div>
            <label class="block text-xs text-slate-400 mb-2 font-medium">SELECT LAYER TARGET</label>
            <select id="layer-select" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">-- Create a Layer First --</option>
            </select>
          </div>

          <div>
            <label class="block text-xs text-slate-400 mb-2 font-medium">TRAIT / ITEM NAME</label>
            <input id="trait-name" type="text" placeholder="e.g. Red BG, Laser Eyes" 
              class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-200" />
          </div>

          <div>
            <label class="block text-xs text-slate-400 mb-2 font-medium">PASTE RAW SVG CODE</label>
            <textarea id="svg-code" rows="5" placeholder="Paste your <svg>...</svg> code here" 
              class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-300"></textarea>
          </div>

          <button id="save-trait-btn" class="w-full bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 text-white font-bold py-3.5 rounded-xl text-sm transition-all shadow-lg">
            Save Trait to Cloud Database
          </button>
        </div>
      </div>

      <!-- Inventory Tree -->
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h3 class="text-base font-bold text-slate-300 mb-3">Stored Trait Inventory</h3>
        <div id="inventory-container" class="space-y-4 max-h-[300px] overflow-y-auto pr-2">
          <p class="text-xs text-slate-500 italic">No traits uploaded yet.</p>
        </div>
      </div>

    </section>

    <!-- Right Panel: Canvas Preview -->
    <section class="lg:col-span-5 space-y-6">
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl sticky top-6">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-cyan-400">
          <span>🖼️</span> Interactive Artboard
        </h2>

        <!-- Canvas -->
        <div class="relative w-full aspect-square bg-slate-950 rounded-xl border-2 border-dashed border-slate-800 overflow-hidden flex items-center justify-center">
          <div id="nft-canvas" class="absolute inset-0 w-full h-full flex items-center justify-center">
             <span class="text-slate-600 text-sm italic select-none">Live layered preview will load here</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="mt-6 space-y-4">
          <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 space-y-3">
            <h4 class="text-xs font-bold text-slate-400 tracking-wider">ACTIVE LAYER STACK ORDER</h4>
            <div id="active-layers-list" class="space-y-2 text-xs">
              <span class="text-slate-500 italic">No active layers stacked</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button id="randomize-btn" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-semibold py-3 rounded-xl text-sm transition-all">
              🎲 Randomize
            </button>
            <button id="download-btn" class="bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-bold py-3 rounded-xl text-sm transition-all shadow-lg">
              📥 Save SVG Art
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyASICdqWjF3bzvtwASwCIXVe0AUfoUeTqU",
      authDomain: "castclick-cdfeb.firebaseapp.com",
      projectId: "castclick-cdfeb",
      storageBucket: "castclick-cdfeb.firebasestorage.app",
      messagingSenderId: "578052056343",
      appId: "1:578052056343:web:1042963805caa11f360352"
    };

    // Init
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let layersData = {};
    let layerOrder = [];
    let selectedCombo = {};

    const dbStatus = document.getElementById('db-status');
    const layerNameInput = document.getElementById('layer-name-input');
    const addLayerBtn = document.getElementById('add-layer-btn');
    const layerSelect = document.getElementById('layer-select');
    const traitNameInput = document.getElementById('trait-name');
    const svgCodeInput = document.getElementById('svg-code');
    const saveTraitBtn = document.getElementById('save-trait-btn');
    const inventoryContainer = document.getElementById('inventory-container');
    const nftCanvas = document.getElementById('nft-canvas');
    const activeLayersList = document.getElementById('active-layers-list');
    const randomizeBtn = document.getElementById('randomize-btn');
    const downloadBtn = document.getElementById('download-btn');

    // Real-time Database Sync (এখান থেকে বুঝা যাবে ডাটাবেস কানেক্ট হয়েছে কিনা)
    try {
      onSnapshot(collection(db, "nft_layers"), (snapshot) => {
        layersData = {};
        layerOrder = [];
        
        snapshot.forEach((doc) => {
          const layerName = doc.id;
          layersData[layerName] = doc.data();
          layerOrder.push(layerName);
        });

        dbStatus.textContent = "Connected to Firebase";
        dbStatus.className = "text-xs text-emerald-400 bg-emerald-950/50 px-3 py-1.5 rounded-full border border-emerald-800";

        updateDropdownsAndTree();
        renderActiveNFT();
      }, (error) => {
        console.error("Firestore Error: ", error);
        dbStatus.textContent = "Database Permission Denied";
        dbStatus.className = "text-xs text-rose-400 bg-rose-950/50 px-3 py-1.5 rounded-full border border-rose-800";
        alert("Firestore Rules-এ রাইট পারমিশন অফ করা আছে। অনুগ্রহ করে Firebase Rules-এ গিয়ে write: if true করে দাও!");
      });
    } catch (e) {
      console.error(e);
    }

    // Create Layer
    addLayerBtn.addEventListener('click', async () => {
      const layerName = layerNameInput.value.trim();
      if (!layerName) return alert('Enter a layer name first!');
      
      try {
        // ফায়ারবেসে একটি ডামি ফিল্ড দিয়ে ডকুমেন্টটি তৈরি করি
        await setDoc(doc(db, "nft_layers", layerName), { _created: true }, { merge: true });
        layerNameInput.value = '';
        alert(`"${layerName}" Layer Created successfully!`);
      } catch (error) {
        console.error(error);
        alert("Error creating layer: " + error.message);
      }
    });

    // Save Trait
    saveTraitBtn.addEventListener('click', async () => {
      const selectedLayer = layerSelect.value;
      const traitName = traitNameInput.value.trim();
      const rawSvgCode = svgCodeInput.value.trim();

      if (!selectedLayer || !traitName || !rawSvgCode) {
        return alert('Fill all fields!');
      }

      try {
        await setDoc(doc(db, "nft_layers", selectedLayer), {
          [traitName]: rawSvgCode
        }, { merge: true });

        traitNameInput.value = '';
        svgCodeInput.value = '';
        alert(`Saved Trait "${traitName}"!`);
      } catch (e) {
        console.error(e);
        alert("Error saving: " + e.message);
      }
    });

    function updateDropdownsAndTree() {
      layerSelect.innerHTML = '<option value="">-- Select Target Layer --</option>';
      inventoryContainer.innerHTML = '';

      const layers = Object.keys(layersData);
      if (layers.length === 0) {
        layerSelect.innerHTML = '<option value="">-- Create a Layer First --</option>';
        inventoryContainer.innerHTML = '<p class="text-xs text-slate-500 italic">No layers loaded.</p>';
        return;
      }

      layers.forEach(layerName => {
        const opt = document.createElement('option');
        opt.value = layerName;
        opt.textContent = layerName;
        layerSelect.appendChild(opt);

        const traitsObj = { ...layersData[layerName] };
        delete traitsObj._created; // ডামি ফিল্ডটি রিমুভ করি
        const traitNames = Object.keys(traitsObj);

        const layerBlock = document.createElement('div');
        layerBlock.className = "bg-slate-950 p-3.5 rounded-xl border border-slate-800 space-y-2";
        
        let traitBadgesHtml = '';
        if (traitNames.length === 0) {
          traitBadgesHtml = `<span class="text-[11px] text-slate-600 italic block">No designs inside this category</span>`;
        } else {
          traitNames.forEach(trait => {
            const isSelected = selectedCombo[layerName] === trait;
            traitBadgesHtml += `
              <button onclick="window.selectTrait('${layerName}', '${trait}')" 
                class="px-2.5 py-1 text-xs rounded-lg font-medium border m-0.5 transition-all ${
                  isSelected 
                  ? 'bg-indigo-600/20 border-indigo-500 text-indigo-300' 
                  : 'bg-slate-900 border-slate-800 text-slate-400 hover:border-slate-700'
                }">
                ${trait}
              </button>
            `;
          });
        }

        layerBlock.innerHTML = `
          <div class="flex justify-between items-center pb-1 border-b border-slate-900">
            <span class="text-xs font-bold text-slate-200 uppercase tracking-wide">${layerName}</span>
            <span class="text-[10px] bg-slate-900 text-slate-500 px-2 py-0.5 rounded-full">${traitNames.length} items</span>
          </div>
          <div class="flex flex-wrap gap-1 pt-1">${traitBadgesHtml}</div>
        `;
        inventoryContainer.appendChild(layerBlock);
      });
    }

    window.selectTrait = function(layerName, traitName) {
      selectedCombo[layerName] = traitName;
      updateDropdownsAndTree();
      renderActiveNFT();
    };

    function renderActiveNFT() {
      nftCanvas.innerHTML = '';
      activeLayersList.innerHTML = '';

      const combinedContainer = document.createElement('div');
      combinedContainer.className = "relative w-full h-full";
      let hasContent = false;

      layerOrder.forEach((layerName) => {
        const activeTrait = selectedCombo[layerName];
        if (activeTrait && layersData[layerName][activeTrait]) {
          hasContent = true;
          
          const badge = document.createElement('div');
          badge.className = "flex justify-between items-center bg-slate-900 px-3 py-2 rounded-lg border border-slate-800";
          badge.innerHTML = `
            <span class="text-slate-400 font-semibold">${layerName}:</span>
            <span class="text-indigo-400 font-mono font-bold">${activeTrait}</span>
          `;
          activeLayersList.appendChild(badge);

          const svgCode = layersData[layerName][activeTrait];
          const parser = new DOMParser();
          const svgDoc = parser.parseFromString(svgCode, "image/svg+xml");
          const svgEl = svgDoc.querySelector('svg');

          if (svgEl) {
            svgEl.style.position = 'absolute';
            svgEl.style.top = '0';
            svgEl.style.left = '0';
            svgEl.style.width = '100%';
            svgEl.style.height = '100%';
            svgEl.style.zIndex = layerOrder.indexOf(layerName);
            combinedContainer.appendChild(svgEl);
          }
        }
      });

      if (hasContent) {
        nftCanvas.appendChild(combinedContainer);
      } else {
        nftCanvas.innerHTML = `<span class="text-slate-600 text-sm italic select-none">No preview active</span>`;
        activeLayersList.innerHTML = `<span class="text-slate-500 italic">No layers loaded.</span>`;
      }
    }

    randomizeBtn.addEventListener('click', () => {
      Object.keys(layersData).forEach(layer => {
        const traits = Object.keys(layersData[layer]).filter(k => k !== '_created');
        if (traits.length > 0) {
          const randomIndex = Math.floor(Math.random() * traits.length);
          selectedCombo[layer] = traits[randomIndex];
        }
      });
      updateDropdownsAndTree();
      renderActiveNFT();
    });

    downloadBtn.addEventListener('click', () => {
      const activeSvgs = nftCanvas.querySelectorAll('svg');
      if (activeSvgs.length === 0) return alert('Nothing to download!');

      let masterSvgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">`;
      activeSvgs.forEach((svg) => {
        masterSvgContent += `<g>${svg.innerHTML}</g>`;
      });
      masterSvgContent += `</svg>`;

      const blob = new Blob([masterSvgContent], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `nft_${Date.now()}.svg`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
