<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কালো ব্যাকগ্রাউন্ড</title>
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --panel-bg: rgba(18, 28, 46, 0.85);
            --border-color: rgba(255, 255, 255, 0.07);
            --text-main: #f0f4ff;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 60%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--text-main);
        }
        .container {
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .header h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header .sub {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.05rem;
        }
        .header .sub span {
            color: var(--accent);
            font-weight: 700;
        }
        .status-box {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 2.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: #93c5fd;
            backdrop-filter: blur(8px);
        }
        .status-box .counter {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }
        .progress-wrapper {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .nft-card {
            background: rgba(30, 41, 59, 0.35);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .nft-card:hover {
            transform: translateY(-4px);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 30px rgba(59, 130, 246, 0.05);
            background: rgba(30, 41, 59, 0.65);
        }
        .nft-card .card-index {
            color: var(--text-muted);
            font-size: 0.65rem;
            font-family: monospace;
            margin-bottom: 0.7rem;
            width: 100%;
            text-align: center;
            opacity: 0.6;
        }
        .nft-card .image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.3);
            background: #000000;
        }
        .nft-card .image-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated; /* পিক্সেল আর্টের ক্লারিটি ধরে রাখার জন্য */
            background: #000000;
        }
        .nft-card .token-id {
            margin-top: 0.6rem;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            background: rgba(59, 130, 246, 0.08);
            padding: 3px 12px;
            border-radius: 100px;
            border: 1px solid rgba(59, 130, 246, 0.08);
        }
        .load-more-btn {
            display: block;
            width: 200px;
            margin: 2rem auto 0 auto;
            padding: 1rem;
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .load-more-btn:hover:not(:disabled) {
            transform: scale(1.05);
            opacity: 0.9;
        }
        .load-more-btn:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(24px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(18, 28, 46, 0.95);
            border-radius: 28px;
            padding: 2rem;
            max-width: 650px;
            width: 100%;
            border: 1px solid rgba(59, 130, 246, 0.15);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            animation: scaleIn 0.3s ease;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #94a3b8;
            font-size: 1.8rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-family: sans-serif;
        }
        .modal-close:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: rotate(90deg);
        }
        .modal-image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(59, 130, 246, 0.1);
            background: #000000;
        }
        .modal-image-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            background: #000000;
        }
        .modal-title {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .modal-sub {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; }
        }
        @media (max-width: 640px) {
            .container { padding: 1.2rem; }
            .header h1 { font-size: 1.8rem; }
            .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .nft-card { padding: 0.7rem; }
            .modal-content { padding: 1.2rem; margin: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Black Background Generator</h1>
        <div class="sub">মূল NFT অপরিবর্তিত · শুধু ব্যাকগ্রাউন্ড কালো · <span>ফ্লিপ ডান → বাম</span></div>
    </div>
    <div class="status-box" id="statusLog">
        ⏳ মেটাডাটা লোড হচ্ছে... <span class="counter" id="loadedCount">0</span> / 10000
    </div>
    <div class="progress-wrapper">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
    <button class="load-more-btn" id="loadMoreBtn" disabled>⏳ লোড হচ্ছে...</button>
</div>

<!-- মোডাল -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <button class="modal-close" id="modalClose">✕</button>
        <div class="modal-image-wrapper">
            <canvas id="modalCanvas" width="600" height="600"></canvas>
        </div>
        <div class="modal-title" id="modalTitle">Token #1</div>
        <div class="modal-sub" id="modalSub">Original NFT · ব্যাকগ্রাউন্ড কালো</div>
    </div>
</div>

<script>
    // ——— কনফিগ ———
    const METADATA_BASE = "ipfs://QmeSjSinHpPnmXmspMjwiXyN6zS4E9zccariGR3jxcaWtq";
    const GATEWAY = "https://ipfs.io/ipfs/";
    const TOTAL_TOKENS = 10000;  // ১০,০০০ টি NFT
    const BATCH_SIZE = 20;
    
    let loadedTokens = 0;
    let isProcessing = false;

    // ——— DOM রেফ ———
    const grid = document.getElementById('cardGrid');
    const statusLog = document.getElementById('statusLog');
    const loadedCount = document.getElementById('loadedCount');
    const progressBar = document.getElementById('progressBar');
    const loadMoreBtn = document.getElementById('loadMoreBtn');

    // ——— মোডাল ———
    const modalOverlay = document.getElementById('modalOverlay');
    const modalCanvas = document.getElementById('modalCanvas');
    const modalTitle = document.getElementById('modalTitle');
    const modalSub = document.getElementById('modalSub');
    const modalClose = document.getElementById('modalClose');

    function closeModal() {
        modalOverlay.classList.remove('active');
        document.body.style.overflow = '';
    }
    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // ——— মেটাডাটা লোড ———
    async function loadMetadata(start, count) {
        const promises = [];
        for (let i = start; i < start + count && i <= TOTAL_TOKENS; i++) {
            const url = `${GATEWAY}${METADATA_BASE.replace('ipfs://', '')}/${i}`;
            promises.push(
                fetch(url)
                    .then(res => res.ok ? res.json() : null)
                    .catch(() => null)
            );
        }
        return Promise.all(promises);
    }

    // ——— অ্যাডভান্সড ড্র ফাংশন (ব্যাকগ্রাউন্ড কালার রিমুভ করে কালো করা ও ফ্লিপ) ———
    function drawNormisNFT(ctx, res, img) {
        // ১. একটি অফ-স্ক্রিন ক্যানভাস তৈরি করছি পিক্সেল প্রসেস করার জন্য
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = res;
        tempCanvas.height = res;
        const tempCtx = tempCanvas.getContext('2d');
        
        // অফ-স্ক্রিন ক্যানভাসে মূল ছবি ড্র করলাম
        tempCtx.drawImage(img, 0, 0, res, res);
        
        // ইমেজ ডাটা এক্সট্রাক্ট করা হচ্ছে
        const imgData = tempCtx.getImageData(0, 0, res, res);
        const data = imgData.data;
        
        // ছবির টপ-লেফট কর্নারের (0,0) পিক্সেলটিকে বেস ব্যাকগ্রাউন্ড কালার হিসেবে ডিটেক্ট করছি
        const bgR = data[0];
        const bgG = data[1];
        const bgB = data[2];
        
        // ব্যাকগ্রাউন্ডের হালকা গ্রেডিয়েন্ট বা নয়েজ সামলানোর জন্য টলারেন্স সেট (ছাড়)
        const tolerance = 35; 

        // প্রতিটি পিক্সেল চেক করে ব্যাকগ্রাউন্ড কালার পিওর ব্ল্যাক (#000000) করা হচ্ছে
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            
            // যদি কারেন্ট পিক্সেলের কালার ডিটেক্টেড ব্যাকগ্রাউন্ড কালারের সাথে ম্যাচ করে
            if (Math.abs(r - bgR) < tolerance && 
                Math.abs(g - bgG) < tolerance && 
                Math.abs(b - bgB) < tolerance) {
                
                data[i] = 0;       // Red
                data[i + 1] = 0;   // Green
                data[i + 2] = 0;   // Blue
                data[i + 3] = 255; // Alpha (সম্পূর্ণ সলিড কালো)
            }
        }
        
        // মডিফাইড ইমেজ ডাটা অফ-স্ক্রিন ক্যানভাসে পুশ করা হলো
        tempCtx.putImageData(imgData, 0, 0);

        // ২. মেইন ডিসপ্লে ক্যানভাস রেডি করা
        ctx.imageSmoothingEnabled = false; // পিক্সেল আর্ট শার্প রাখার জন্য ফলস
        
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, res, res);
        
        // ৩. প্রসেসড অফ-স্ক্রিন ইমেজকে ডান থেকে বামে ফ্লিপ করে ড্র
        ctx.save();
        ctx.translate(res, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(tempCanvas, 0, 0, res, res);
        ctx.restore();
    }

    // ——— একক NFT প্রসেস ———
    function processNFT(metadata, index) {
        return new Promise((resolve) => {
            const imgUrl = metadata?.image || metadata?.file_url || '';
            if (!imgUrl) {
                resolve(null);
                return;
            }

            const finalUrl = imgUrl.startsWith('ipfs://') 
                ? imgUrl.replace('ipfs://', GATEWAY) 
                : imgUrl;

            const img = new Image();
            img.crossOrigin = "Anonymous"; // পিক্সেল ম্যানিপুলেশনের জন্য এটি বাধ্যতামূলক (CORS সমাধান)

            img.onload = () => {
                const res = 512; 
                const canvas = document.createElement('canvas');
                canvas.width = res;
                canvas.height = res;
                const ctx = canvas.getContext('2d');
                
                // ইমেজ প্রসেসিং ও ড্র ফাংশন কল
                drawNormisNFT(ctx, res, img);

                const card = document.createElement('div');
                card.className = 'nft-card';
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-index">#${index}</div>
                    <div class="image-wrapper"></div>
                    <div class="token-id">🗿 Token #${index}</div>
                `;

                const wrapper = card.querySelector('.image-wrapper');
                wrapper.appendChild(canvas);

                card.addEventListener('click', () => {
                    openModal(canvas, `🗿 Token #${index}`, `Normis Style · শুধু ব্যাকগ্রাউন্ড কালো · ${index}/10000`);
                });

                resolve(card);
            };

            img.onerror = () => resolve(null);
            img.src = finalUrl;
        });
    }

    // ——— মোডাল ওপেন ———
    function openModal(sourceCanvas, title, sub) {
        const ctx = modalCanvas.getContext('2d');
        modalCanvas.width = 600;
        modalCanvas.height = 600;
        ctx.imageSmoothingEnabled = false;

        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, 600, 600);
        ctx.drawImage(sourceCanvas, 0, 0, 600, 600);

        modalTitle.textContent = title;
        modalSub.textContent = sub;
        modalOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    // ——— ব্যাচ প্রসেস ———
    async function processBatch(startIndex) {
        if (isProcessing) return;
        isProcessing = true;
        loadMoreBtn.disabled = true;
        loadMoreBtn.textContent = '⏳ প্রসেসিং...';

        const end = Math.min(startIndex + BATCH_SIZE - 1, TOTAL_TOKENS);
        const count = end - startIndex + 1;

        statusLog.innerHTML = `⏳ মেটাডাটা লোড হচ্ছে... <span class="counter">${loadedTokens}</span> / ${TOTAL_TOKENS}`;
        const metadatas = await loadMetadata(startIndex, count);
        const fragment = document.createDocumentFragment();

        for (let i = 0; i < metadatas.length; i++) {
            const meta = metadatas[i];
            const tokenIndex = startIndex + i;
            const card = await processNFT(meta, tokenIndex);
            if (card) {
                fragment.appendChild(card);
            }
            loadedTokens++;
            loadedCount.textContent = loadedTokens;
            progressBar.style.width = `${(loadedTokens / TOTAL_TOKENS) * 100}%`;
            statusLog.innerHTML = `⏳ প্রসেসিং... <span class="counter">${loadedTokens}</span> / ${TOTAL_TOKENS}`;
        }

        grid.appendChild(fragment);

        if (loadedTokens >= TOTAL_TOKENS) {
            statusLog.innerHTML = `✅ সম্পূর্ণ! <span class="counter">${TOTAL_TOKENS}</span> টি NFT শুধু ব্যাকগ্রাউন্ড কালো করে (ফ্লিপ সহ) লোড হয়েছে!`;
            loadMoreBtn.style.display = 'none';
        } else {
            statusLog.innerHTML = `⏳ লোড হচ্ছে... <span class="counter">${loadedTokens}</span> / ${TOTAL_TOKENS}`;
            loadMoreBtn.textContent = `📥 আরও ${Math.min(BATCH_SIZE, TOTAL_TOKENS - loadedTokens)}টি লোড করুন`;
            loadMoreBtn.disabled = false;
        }
        isProcessing = false;
    }

    loadMoreBtn.addEventListener('click', () => {
        if (!isProcessing && loadedTokens < TOTAL_TOKENS) {
            processBatch(loadedTokens + 1);
        }
    });

    // প্রথম ব্যাচ রান করা
    processBatch(1);
</script>
</body>
</html>
